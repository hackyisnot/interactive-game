<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>interactive?</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div id="intro">
        <div class="horror">
            <span class="run">RUN!</span>
            <span class="hide">HIDE!</span>
            <span class="for">FOR</span>
            <span class="he">HE</span>
            <span class="she">SHE</span>
            <span class="will">WILL</span>
            <span class="find">FIND</span>
            <span class="you">YOU!</span>
        </div>
    </div>

    <div id="splash">
        <h1 class="fade-in" >Hackyisnot presents...</h1>
    </div>
    
    <div id="menu" >
        <button class="start">START</button>
        <button class="settings">SETTINGS</button>
    </div>

    <audio id="introMusic" autoplay loop>
        <source src="leberch-suspense-516354 (1).mp3" type="audio/mpeg">
    </audio>

    <script src="index.js">
        window.onload = () => {
         const music = document.getElementById('introMusic');
         music.play().catch(err => console.log('autoplay blocked:', err));
        };
    </script>
   
</body>
</html>
